[pytest]
markers =
    api: API-level security tests
    ui: Browser-based UI security tests (Playwright)
    security: General security tests
    critical: Critical severity findings
    smoke: Fast subset for quick validation
    slow: Long-running tests
    sqli: SQL Injection tests
    xss: Cross-Site Scripting tests
    auth: Authentication and session tests
    idor: Insecure Direct Object Reference tests
    headers: Security headers tests

testpaths = tests
addopts =
    -v
    --strict-markers
    --tb=short
    --html=reports/report.html
    --self-contained-html
