name: Security Test Suite

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1" # Every Monday at 06:00 UTC

permissions:
  contents: read

jobs:
  api-tests:
    name: API Security Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      juice-shop:
        image: bkimminich/juice-shop:latest
        ports:
          - 3000:3000
        env:
          NODE_ENV: unsafe
        options: >-
          --health-cmd "curl -f http://localhost:3000 || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Wait for Juice Shop
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:3000/rest/admin/application-version && break
            echo "Waiting for Juice Shop... ($i/30)"
            sleep 2
          done

      - name: Run API tests
        env:
          JUICE_SHOP_URL: http://localhost:3000
          TEST_ADMIN_EMAIL: ${{ secrets.TEST_ADMIN_EMAIL || 'admin@juice-sh.op' }}
          TEST_ADMIN_PASSWORD: ${{ secrets.TEST_ADMIN_PASSWORD || 'admin123' }}
        run: |
          pytest tests/api/ -v --html=reports/api-report.html --self-contained-html

      - name: Upload API report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-test-report
          path: reports/
          retention-days: 30

  ui-tests:
    name: UI Security Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      juice-shop:
        image: bkimminich/juice-shop:latest
        ports:
          - 3000:3000
        env:
          NODE_ENV: unsafe
        options: >-
          --health-cmd "curl -f http://localhost:3000 || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install --with-deps chromium

      - name: Wait for Juice Shop
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:3000/rest/admin/application-version && break
            echo "Waiting for Juice Shop... ($i/30)"
            sleep 2
          done

      - name: Run UI tests
        env:
          JUICE_SHOP_URL: http://localhost:3000
          TEST_ADMIN_EMAIL: ${{ secrets.TEST_ADMIN_EMAIL || 'admin@juice-sh.op' }}
          TEST_ADMIN_PASSWORD: ${{ secrets.TEST_ADMIN_PASSWORD || 'admin123' }}
          HEADLESS: "true"
        run: |
          pytest tests/ui/ -v --html=reports/ui-report.html --self-contained-html

      - name: Upload UI report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-test-report
          path: reports/
          retention-days: 30

      - name: Upload failure screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-screenshots
          path: reports/screenshots/
          retention-days: 14
