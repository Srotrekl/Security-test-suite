services:
  juice-shop:
    image: bkimminich/juice-shop:latest
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=unsafe
    restart: unless-stopped

  zap:
    image: ghcr.io/zaproxy/zaproxy:stable
    command: zap-baseline.py -t http://juice-shop:3000 -r zap-report.html -I
    depends_on:
      juice-shop:
        condition: service_started
    volumes:
      - ./reports:/zap/wrk:rw
    profiles:
      - scan
